name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: user_crud
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/user_crud?schema=public
          # DATABASE_URL: postgresql://user_crud_db_80ru_user:LRMM0hSKOchhE7uOBIOR96K6pTeVF6G6@dpg-d7u5k9jtqb8s739tbsv0-a.oregon-postgres.render.com/user_crud_db_80ru

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/user_crud?schema=public
          # DATABASE_URL: postgresql://user_crud_db_80ru_user:LRMM0hSKOchhE7uOBIOR96K6pTeVF6G6@dpg-d7u5k9jtqb8s739tbsv0-a.oregon-postgres.render.com/user_crud_db_80ru

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/user_crud?schema=public
          # DATABASE_URL: postgresql://user_crud_db_80ru_user:LRMM0hSKOchhE7uOBIOR96K6pTeVF6G6@dpg-d7u5k9jtqb8s739tbsv0-a.oregon-postgres.render.com/user_crud_db_80ru

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/user_crud?schema=public
          # DATABASE_URL: postgresql://user_crud_db_80ru_user:LRMM0hSKOchhE7uOBIOR96K6pTeVF6G6@dpg-d7u5k9jtqb8s739tbsv0-a.oregon-postgres.render.com/user_crud_db_80ru
      - name: Build
        run: npm run build